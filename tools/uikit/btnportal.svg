<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
<defs>
  <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#eecf86"/><stop offset=".4" stop-color="#a8823c"/>
    <stop offset=".75" stop-color="#5c4418"/><stop offset="1" stop-color="#281c07"/>
  </linearGradient>
  <radialGradient id="face" cx=".4" cy=".3" r="1">
    <stop offset="0" stop-color="#101a2e"/><stop offset=".7" stop-color="#080d18"/><stop offset="1" stop-color="#04060b"/>
  </radialGradient>
  <radialGradient id="ringFace" cx=".38" cy=".3" r="1">
    <stop offset="0" stop-color="#6f5426"/><stop offset=".6" stop-color="#2e2008"/><stop offset="1" stop-color="#170f05"/>
  </radialGradient>
  <radialGradient id="sapphire" cx=".38" cy=".3" r="1">
    <stop offset="0" stop-color="#cfe4ff"/><stop offset=".35" stop-color="#4d8fe8"/>
    <stop offset=".75" stop-color="#123a80"/><stop offset="1" stop-color="#071838"/>
  </radialGradient>
  <filter id="emboss" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="1.3" result="b"/>
    <feSpecularLighting in="b" surfaceScale="2.2" specularConstant=".3" specularExponent="12" lighting-color="#dfeaff" result="s">
      <fePointLight x="90" y="60" z="120"/>
    </feSpecularLighting>
    <feComposite in="s" in2="SourceAlpha" operator="in" result="s2"/>
    <feComposite in="SourceGraphic" in2="s2" operator="arithmetic" k1="0" k2="1" k3=".55" k4="0"/>
  </filter>
</defs>
<ellipse cx="128" cy="140" rx="112" ry="104" fill="rgba(0,0,0,.4)"/>
<g filter="url(#emboss)">
  <circle cx="128" cy="128" r="104" fill="url(#face)"/>
  <circle cx="128" cy="128" r="108" fill="none" stroke="url(#ringFace)" stroke-width="15"/>
  <circle cx="128" cy="128" r="118" fill="none" stroke="url(#gold)" stroke-width="4.5"/>
  <circle cx="128" cy="128" r="99" fill="none" stroke="#000" stroke-opacity=".8" stroke-width="4"/>
  <!-- сапфировый вихрь портала -->
  <ellipse cx="128" cy="128" rx="52" ry="68" fill="url(#sapphire)" stroke="#0a1c40" stroke-width="4"/>
  <path d="M128 74 C158 92 158 118 128 128 C98 138 98 164 128 182" fill="none"
    stroke="#bfe0ff" stroke-width="7" stroke-linecap="round" opacity=".8"/>
  <path d="M128 88 C146 100 146 116 128 124" fill="none" stroke="#eaf4ff" stroke-width="4" stroke-linecap="round" opacity=".7"/>
  <ellipse cx="112" cy="96" rx="10" ry="16" fill="#ffffff" opacity=".35" transform="rotate(-20 112 96)"/>
</g>
</svg>
