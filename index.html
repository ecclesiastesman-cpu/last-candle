<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05060a">
<meta name="description" content="Последняя Свеча — мрачная оффлайн ARPG в духе Diablo. 5 классов, таланты, лут, боссы. Играет без интернета.">
<title>Последняя Свеча</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./assets/icon-192.png">
<link rel="apple-touch-icon" href="./assets/icon-192.png">
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#05060a;overscroll-behavior:none;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:none;
  font-family:Georgia,'Times New Roman',serif;color:#e0d9c8}
canvas{display:block;position:fixed;inset:0}
#dev{position:fixed;top:calc(4px + env(safe-area-inset-top));left:4px;color:#0f0;font:12px monospace;display:none;z-index:99}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#ui .toast{position:relative;margin:6px auto 0;top:calc(70px + env(safe-area-inset-top));width:fit-content;max-width:86vw;
  background:rgba(10,8,5,.88);border:1px solid #5c4a1e;padding:6px 14px;border-radius:3px;
  font-size:14px;text-align:center;animation:toast 2.6s forwards;pointer-events:none}
@keyframes toast{0%{opacity:0;transform:translateY(-8px)}12%{opacity:1;transform:none}80%{opacity:1}100%{opacity:0}}
.panel{position:absolute;inset:0;pointer-events:auto;overflow-y:auto;
  padding:calc(8px + env(safe-area-inset-top)) 10px calc(20px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling:touch;touch-action:pan-y;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(60,48,24,.14), transparent 60%),
    repeating-linear-gradient(45deg, rgba(255,255,255,.012) 0 2px, transparent 2px 4px),
    linear-gradient(#0b0906, #060503)}
.bigtext .panel{font-size:118%}
.tabs{display:flex;gap:6px;position:sticky;top:0;z-index:2;align-items:center;
  background:linear-gradient(rgba(9,7,4,.98), rgba(9,7,4,.92));padding:6px 0;
  border-bottom:1px solid #4a3a16;box-shadow:0 6px 12px rgba(0,0,0,.5)}
.tab{flex:1;background:linear-gradient(#221a0c,#120d06);border:1px solid #5c4a1e;color:#c9bf9f;
  padding:10px 4px;font-family:inherit;font-size:15px;border-radius:3px;
  box-shadow:inset 0 1px 0 rgba(255,220,140,.12), 0 2px 4px rgba(0,0,0,.5)}
.tab.on{background:linear-gradient(#3a2c10,#241a08);color:#ffd75e;border-color:#a4813a;
  box-shadow:inset 0 1px 0 rgba(255,220,140,.25), inset 0 0 14px rgba(255,190,80,.12)}
.tab.x{flex:0 0 44px;color:#c66;font-size:18px}
.h1{font-size:20px;color:#e8dcc0;flex:1;text-align:center;text-shadow:0 0 14px rgba(210,160,60,.35)}
.h1red{font-size:34px;color:#c62828;text-align:center;margin:30px 0 10px;text-shadow:0 0 24px #500}
.h2{font-size:15px;color:#c99b2c;margin:12px 0 6px;padding-bottom:3px;letter-spacing:.4px;
  border-bottom:1px solid transparent;
  border-image:linear-gradient(90deg,#7a5c14,rgba(122,92,20,0)) 1}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cols3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media (max-width:520px){.cols{grid-template-columns:1fr}.cols3{grid-template-columns:1fr}}
/* сетка предметов как в D2 */
.grid{display:grid;grid-template-columns:repeat(auto-fill, 52px);gap:6px;justify-content:start}
.cell{width:52px;height:52px;border-radius:3px;position:relative;
  background:linear-gradient(145deg,#17120a,#0b0805);
  border:1.5px solid #3a2f16;box-shadow:inset 0 0 8px rgba(0,0,0,.8);
  display:flex;align-items:center;justify-content:center}
.cell img{max-width:44px;max-height:44px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.8))}
.cell.r-magic{border-color:#3d5f9e;box-shadow:inset 0 0 8px rgba(58,110,220,.25)}
.cell.r-rare{border-color:#a4813a;box-shadow:inset 0 0 8px rgba(255,215,94,.28)}
.cell.r-set{border-color:#2f7a42;box-shadow:inset 0 0 8px rgba(97,217,122,.3)}
.cell.r-unique{border-color:#a35a1f;box-shadow:inset 0 0 10px rgba(255,152,64,.35)}
.cell .lvlreq{position:absolute;right:2px;bottom:1px;font-size:9px;color:#c66}
.cell.empty{opacity:.55}
.cell .slotname{font-size:8.5px;color:#5a5040;text-align:center;line-height:1.1;padding:0 2px}
/* бумажная кукла: сокеты вокруг героя */
.paperdoll{display:grid;grid-template-columns:56px 1fr 56px;gap:6px;align-items:center;
  background:radial-gradient(ellipse at 50% 85%, rgba(80,60,24,.22), transparent 70%),
    linear-gradient(#141008,#0a0805);border:1.5px solid #4a3a16;border-radius:6px;padding:10px 8px;
  box-shadow:inset 0 0 30px rgba(0,0,0,.7)}
.paperdoll .dcol{display:flex;flex-direction:column;gap:6px;align-items:center}
.paperdoll .dollimg{text-align:center}
.paperdoll .dollimg img{height:190px;filter:drop-shadow(0 8px 10px rgba(0,0,0,.7))}
.eslot{font-size:13px;color:#8d8574;margin:4px 0}
.empty{color:#4a443a}
.gold{margin:10px 0;font-size:15px}
button{background:linear-gradient(#241b0b,#140e06);border:1px solid #8c6d1f;color:#e8dcc0;
  font-family:inherit;border-radius:3px;padding:7px 12px;font-size:14px;margin:2px;
  box-shadow:inset 0 1px 0 rgba(255,220,140,.14), 0 2px 5px rgba(0,0,0,.5)}
button:active{background:#3a2d10;box-shadow:inset 0 2px 8px rgba(0,0,0,.6)}
.big{display:block;width:100%;padding:15px;font-size:17px;margin:7px 0;text-align:left}
.portal{border-color:#7a4a10;background:linear-gradient(#1c1105,#0f0903)}
.rift{border-color:#6a1b9a}
.townbtns{max-width:480px;margin:0 auto}
.note{color:#6a6355;font-size:13px;text-align:center;margin:16px 0}
.statrow{font-size:15px;margin:7px 0}
.statrow button{padding:4px 14px;font-size:16px;margin-left:8px}
.branch{background:linear-gradient(#100d07,#0a0805);padding:8px;border:1px solid #3a2c10;border-radius:4px;
  box-shadow:inset 0 0 18px rgba(0,0,0,.55)}
.talent{border-bottom:1px solid #241d0d;padding:7px 3px}
.talent.locked{opacity:.45}
.talent.known .tname{color:#ffd75e}
.tname{font-size:14.5px}
.pips{letter-spacing:2px;font-size:11px;color:#4a3f22}
.pips b{color:#ffd75e}
.tdesc{font-size:12px;color:#8d8574;margin:2px 0}
.tt{position:sticky;bottom:0;background:linear-gradient(#120e07,#0a0704);border:1.5px solid #a4813a;
  padding:10px;margin-top:10px;border-radius:4px;box-shadow:0 -6px 20px rgba(0,0,0,.6), inset 0 0 16px rgba(0,0,0,.6)}
.ttname{font-size:16px}
.ttt,.ttreq{font-size:12px;color:#8d8574}
.tts{font-size:13px;color:#9fb4c7;margin:2px 0}
.tts .lore,.lore{color:#7a6a45;font-style:italic}
.ttbtns{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.death{text-align:center;max-width:420px;margin:14vh auto}
.xpline{font-size:13px;color:#8d8574}
#ttbox{display:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"></div>
<div id="dev"></div>
<script>
// показать dev-оверлей по ?dev=1
if (new URLSearchParams(location.search).has('dev')) document.getElementById('dev').style.display='block';
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
