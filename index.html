<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05060a">
<meta name="description" content="Последняя Свеча — мрачная оффлайн ARPG в духе Diablo. 5 классов, таланты, лут, боссы. Играет без интернета.">
<title>Последняя Свеча</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./assets/icon-192.png">
<link rel="apple-touch-icon" href="./assets/icon-192.png">
<style>
@font-face{font-family:'Forum';src:url('./assets/fonts/forum.woff2') format('woff2');font-display:swap}
@font-face{font-family:'Ruslan';src:url('./assets/fonts/ruslan.woff2') format('woff2');font-display:swap}
html,body{margin:0;height:100%;overflow:hidden;background:#05060a;overscroll-behavior:none;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:none;
  font-family:Georgia,'Times New Roman',serif;color:#e0d9c8}
canvas{display:block;position:fixed;inset:0}
#dev{position:fixed;top:calc(4px + env(safe-area-inset-top));left:4px;color:#0f0;font:12px monospace;display:none;z-index:99}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#ui .toast{position:relative;margin:6px auto 0;top:calc(70px + env(safe-area-inset-top));width:fit-content;max-width:86vw;
  background:rgba(10,8,5,.9);border:1px solid #6b5320;padding:6px 16px;
  clip-path:polygon(8px 0,calc(100% - 8px) 0,100% 50%,calc(100% - 8px) 100%,8px 100%,0 50%);
  font-family:'Forum',Georgia,serif;font-size:15px;text-align:center;animation:toast 2.6s forwards;pointer-events:none}
@keyframes toast{0%{opacity:0;transform:translateY(-8px)}12%{opacity:1;transform:none}80%{opacity:1}100%{opacity:0}}
/* --- панель: камень + готическая рама по краю экрана --- */
.panel{position:absolute;inset:0;pointer-events:auto;overflow-y:auto;
  padding:calc(10px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling:touch;touch-action:pan-y;
  background:
    radial-gradient(ellipse at 50% -5%, rgba(70,52,22,.18), transparent 55%),
    radial-gradient(ellipse at 50% 108%, rgba(40,26,10,.25), transparent 55%),
    repeating-linear-gradient(45deg, rgba(255,255,255,.011) 0 2px, transparent 2px 4px),
    repeating-linear-gradient(-45deg, rgba(0,0,0,.12) 0 1px, transparent 1px 5px),
    linear-gradient(#0c0a06, #060503)}
.panel::after{content:'';position:fixed;inset:4px;pointer-events:none;z-index:5;
  border:14px solid transparent;
  border-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='96' height='96'><g fill='none' stroke='%237a5c1e' stroke-width='1.6'><path d='M4 34 V12 Q4 4 12 4 H34'/><path d='M8 34 V14 Q8 8 14 8 H34' stroke='%23443311' stroke-width='1'/><path d='M62 4 H84 Q92 4 92 12 V34'/><path d='M62 8 H82 Q88 8 88 14 V34' stroke='%23443311' stroke-width='1'/><path d='M4 62 V84 Q4 92 12 92 H34'/><path d='M8 62 V82 Q8 88 14 88 H34' stroke='%23443311' stroke-width='1'/><path d='M92 62 V84 Q92 92 84 92 H62'/><path d='M88 62 V82 Q88 88 82 88 H62' stroke='%23443311' stroke-width='1'/><path d='M34 4 H62 M34 92 H62 M4 34 V62 M92 34 V62' stroke='%23443311' stroke-width='1'/></g><g fill='%238c6d1f'><path d='M12 12 l5 -2 -2 5 z'/><path d='M84 12 l2 5 -5 -2 z'/><path d='M12 84 l-2 -5 5 2 z'/><path d='M84 84 l-5 2 2 -5 z'/><circle cx='48' cy='4' r='2'/><circle cx='48' cy='92' r='2'/><circle cx='4' cy='48' r='2'/><circle cx='92' cy='48' r='2'/></g></svg>") 32 repeat}
.panel.transparent::after{display:none}
.panel.transparent{background:transparent}
.panel>*:not(.tabs){max-width:840px;margin-left:auto;margin-right:auto}
.panel>.paperdoll{max-width:560px}
.bigtext .panel{font-size:118%}
/* --- вкладки: резной камень --- */
.tabs{display:flex;gap:7px;position:sticky;top:0;z-index:2;align-items:center;
  background:linear-gradient(rgba(10,8,4,.98), rgba(10,8,4,.9));padding:7px 2px;
  border-bottom:1px solid #4a3a16;box-shadow:0 8px 16px rgba(0,0,0,.55);
  max-width:840px;margin:0 auto}
.tab{flex:1;background:linear-gradient(#261d0c,#120d06);border:1px solid #5c4a1e;color:#c9bf9f;
  padding:11px 4px;font-family:'Forum',Georgia,serif;font-size:17px;letter-spacing:.6px;
  clip-path:polygon(7px 0,calc(100% - 7px) 0,100% 7px,100% calc(100% - 7px),calc(100% - 7px) 100%,7px 100%,0 calc(100% - 7px),0 7px);
  box-shadow:inset 0 1px 0 rgba(255,220,140,.14), inset 0 -6px 10px rgba(0,0,0,.4)}
.tab.on{background:linear-gradient(#4a3812,#241a08);color:#ffd75e;border-color:#b8934a;
  text-shadow:0 0 10px rgba(255,200,90,.45);
  box-shadow:inset 0 1px 0 rgba(255,220,140,.3), inset 0 0 18px rgba(255,190,80,.14)}
.tab.x{flex:0 0 46px;color:#c66;font-size:18px;font-family:Georgia,serif}
.h1{font-size:22px;color:#e8dcc0;flex:1;text-align:center;font-family:'Forum',Georgia,serif;
  letter-spacing:1px;text-shadow:0 0 16px rgba(210,160,60,.4)}
.h1red{font-size:40px;color:#c62828;text-align:center;margin:30px 0 10px;font-family:'Ruslan',Georgia,serif;text-shadow:0 0 28px #600}
/* --- заголовки секций: ромб-разделитель --- */
.h2{display:flex;align-items:center;gap:10px;font-size:16px;color:#c99b2c;margin:14px 0 8px;
  font-family:'Forum',Georgia,serif;letter-spacing:1px}
.h2::before,.h2::after{content:'';height:1px;flex:1;
  background:linear-gradient(90deg,transparent,#7a5c14 30%,#7a5c14 70%,transparent)}
.h2::before{background:linear-gradient(90deg,#7a5c14,transparent)}
.h2::after{background:linear-gradient(90deg,transparent,#7a5c14)}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cols3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media (max-width:520px){.cols{grid-template-columns:1fr}.cols3{grid-template-columns:1fr}}
/* --- сетка предметов: каменные сокеты с фаской --- */
.grid{display:grid;grid-template-columns:repeat(auto-fill, 54px);gap:7px;justify-content:center}
.cell{width:54px;height:54px;position:relative;
  background:
    radial-gradient(ellipse at 50% 26%, rgba(96,80,52,.16), transparent 65%),
    linear-gradient(160deg,#1b150b,#0a0705 70%);
  border:1px solid #000;
  clip-path:polygon(5px 0,calc(100% - 5px) 0,100% 5px,100% calc(100% - 5px),calc(100% - 5px) 100%,5px 100%,0 calc(100% - 5px),0 5px);
  box-shadow:inset 1.5px 1.5px 2px rgba(190,160,110,.18), inset -2px -2px 3px rgba(0,0,0,.9), inset 0 0 12px rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center}
.cell::after{content:'';position:absolute;inset:2px;pointer-events:none;
  clip-path:polygon(4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px),0 4px);
  border:1px solid rgba(90,72,38,.5)}
.cell img{width:46px;height:46px;object-fit:contain;filter:drop-shadow(0 2px 3px rgba(0,0,0,.85))}
.cell.r-magic::after{border-color:#3d5f9e}.cell.r-magic{box-shadow:inset 1.5px 1.5px 2px rgba(150,180,255,.14), inset -2px -2px 3px rgba(0,0,0,.9), inset 0 0 12px rgba(58,110,220,.3)}
.cell.r-rare::after{border-color:#b8934a}.cell.r-rare{box-shadow:inset 1.5px 1.5px 2px rgba(255,225,150,.16), inset -2px -2px 3px rgba(0,0,0,.9), inset 0 0 12px rgba(255,215,94,.3)}
.cell.r-set::after{border-color:#2f7a42}.cell.r-set{box-shadow:inset 1.5px 1.5px 2px rgba(150,255,170,.12), inset -2px -2px 3px rgba(0,0,0,.9), inset 0 0 12px rgba(97,217,122,.32)}
.cell.r-unique::after{border-color:#b8722d}.cell.r-unique{box-shadow:inset 1.5px 1.5px 2px rgba(255,200,140,.16), inset -2px -2px 3px rgba(0,0,0,.9), inset 0 0 14px rgba(255,152,64,.38)}
.cell .lvlreq{position:absolute;right:3px;bottom:2px;font-size:9px;color:#d66}
.cell.empty{opacity:.5}
.cell .slotname{font-size:9px;color:#5a5040;text-align:center;line-height:1.1;padding:0 2px;font-family:'Forum',Georgia,serif;letter-spacing:.4px}
/* --- бумажная кукла --- */
.paperdoll{display:grid;grid-template-columns:58px 1fr 58px;gap:6px;align-items:center;
  max-width:560px;margin-left:auto;margin-right:auto;
  background:
    radial-gradient(ellipse at 50% 88%, rgba(90,66,26,.26), transparent 68%),
    repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 4px),
    linear-gradient(#161108,#0a0805);
  border:1px solid #4a3a16;outline:1px solid #1a1206;outline-offset:2px;padding:12px 9px;
  box-shadow:inset 0 0 36px rgba(0,0,0,.75), 0 4px 14px rgba(0,0,0,.5)}
.paperdoll .dcol{display:flex;flex-direction:column;gap:7px;align-items:center}
.paperdoll .dollimg{text-align:center}
.paperdoll .dollimg img{height:clamp(130px, 26vh, 195px);filter:drop-shadow(0 8px 10px rgba(0,0,0,.7))}
.eslot{font-size:13px;color:#8d8574;margin:4px 0}
.empty{color:#4a443a}
.gold{margin:10px 0;font-size:16px;font-family:'Forum',Georgia,serif}
/* --- кнопки: кованая бронза с фаской --- */
button{background:linear-gradient(#2a1f0d,#150f06);border:1px solid #8c6d1f;color:#e8dcc0;
  font-family:'Forum',Georgia,serif;letter-spacing:.5px;padding:8px 14px;font-size:15px;margin:2px;
  clip-path:polygon(6px 0,calc(100% - 6px) 0,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0 calc(100% - 6px),0 6px);
  box-shadow:inset 0 1px 0 rgba(255,220,140,.16), inset 0 -5px 9px rgba(0,0,0,.4)}
button:active{background:#3a2d10;box-shadow:inset 0 2px 8px rgba(0,0,0,.6)}
button.primary{background:linear-gradient(#7a5c14,#3a2a08);border-color:#d8b25a;color:#ffe9a0;
  text-shadow:0 1px 2px rgba(0,0,0,.6);box-shadow:inset 0 1px 0 rgba(255,235,170,.35), inset 0 -6px 10px rgba(0,0,0,.35), 0 0 12px rgba(255,190,80,.15)}
.big{display:block;width:100%;padding:15px;font-size:18px;margin:8px 0;text-align:left}
.portal{border-color:#7a4a10;background:linear-gradient(#1c1105,#0f0903)}
.rift{border-color:#6a1b9a}
.townbtns{max-width:480px;margin:0 auto}
.note{color:#6a6355;font-size:13px;text-align:center;margin:16px 0}
.statrow{font-size:15px;margin:7px 0}
.statrow button{padding:4px 14px;font-size:16px;margin-left:8px}
.branch{background:linear-gradient(#110e07,#0a0805);padding:9px;border:1px solid #3a2c10;
  outline:1px solid #17110a;outline-offset:2px;
  box-shadow:inset 0 0 20px rgba(0,0,0,.6)}
.talent{border-bottom:1px solid #241d0d;padding:7px 3px}
.talent.locked{opacity:.45}
.talent.known .tname{color:#ffd75e}
.tname{font-size:15px;font-family:'Forum',Georgia,serif;letter-spacing:.3px}
.tname .ticon{width:20px;height:20px;vertical-align:-4px;margin-right:6px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.7))}
.pips{letter-spacing:2px;font-size:11px;color:#4a3f22}
.pips b{color:#ffd75e}
.tdesc{font-size:12px;color:#8d8574;margin:2px 0}
/* --- карточка предмета --- */
.tt{position:sticky;bottom:0;background:
    radial-gradient(ellipse at 50% 0%, rgba(90,66,26,.14), transparent 60%),
    linear-gradient(#14100a,#0a0704);
  border:1px solid #a4813a;outline:1px solid #241a08;outline-offset:2px;
  padding:11px 13px;margin-top:10px;
  box-shadow:0 -8px 24px rgba(0,0,0,.65), inset 0 0 18px rgba(0,0,0,.6)}
.ttname{font-size:18px;font-family:'Forum',Georgia,serif;letter-spacing:.5px}
.ttclose{float:right;padding:2px 9px;font-size:14px;color:#c66;margin:-2px -4px 0 6px}
.ttt,.ttreq{font-size:12px;color:#8d8574}
.tts{font-size:13px;color:#9fb4c7;margin:2.5px 0}
.tts .lore,.lore{color:#7a6a45;font-style:italic}
.cmp{font-size:12.5px;margin:2px 0}
.cmp.up{color:#7fd68a}.cmp.down{color:#d66a5c}.cmp.same{color:#8d8574}
.cmphead{font-size:11.5px;color:#8d8574;margin-top:7px;letter-spacing:.4px;text-transform:uppercase}
.tthint{font-size:11px;color:#5f5744;margin-top:6px;font-style:italic}
.ttbtns{margin-top:9px;display:flex;flex-wrap:wrap;gap:5px}
.death{text-align:center;max-width:420px;margin:14vh auto}
.xpline{font-size:13px;color:#8d8574}
#ttbox{display:none}
/* --- лендскейп-first: телефон горизонтально --- */
.invwrap{display:flex;flex-direction:column;gap:4px}
@media (orientation:landscape){
  .panel{padding-left:calc(14px + env(safe-area-inset-left));padding-right:calc(14px + env(safe-area-inset-right))}
  .invwrap{flex-direction:row;align-items:flex-start;gap:16px;max-width:1100px}
  .invleft{flex:0 0 46%;max-width:470px;min-width:0}
  .invright{flex:1;min-width:0}
  .panel>.paperdoll, .invleft .paperdoll{max-width:none}
  .paperdoll .dollimg img{height:clamp(120px, 34vh, 190px)}
  /* карточка предмета — колонкой справа, не съедает экран */
  #ttbox .tt{position:fixed;right:calc(12px + env(safe-area-inset-right));top:72px;bottom:auto;
    width:300px;max-height:calc(100vh - 96px);overflow-y:auto;z-index:6;
    box-shadow:-8px 8px 26px rgba(0,0,0,.7), inset 0 0 18px rgba(0,0,0,.6)}
  .townbtns{max-width:760px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .townbtns .big{margin:0}
  .menuwrap{min-height:calc(100vh - 40px)}
  .menuspacer{flex:1 1 30vh}
  .cols3{max-width:1100px}
}
/* --- главное меню и выбор класса --- */
.menuwrap{max-width:420px;margin:0 auto;display:flex;flex-direction:column;min-height:calc(100vh - 60px)}
.menuspacer{flex:1 1 38vh}
.menubtn{text-align:center;font-size:20px;padding:16px;
  background:linear-gradient(#2c210e,#140e06);border-color:#8c6d1f}
.menubtn .sub{display:block;font-size:13px;color:#9a8f72;margin-top:3px;font-family:Georgia,serif}
.warn{background:rgba(60,10,10,.5);border:1px solid #8c2a2a;padding:10px;margin:8px 0;text-align:center;font-size:14px}
.credits{margin-top:auto;padding-top:24px;color:#565045;font-size:11px;text-align:center;line-height:1.5}
.classbtn{display:flex;align-items:center;gap:14px;padding:10px 14px}
.classbtn .cprev{width:64px;height:84px;object-fit:contain;flex:0 0 64px;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,.8))}
.classbtn .ctext{flex:1}
.classbtn .ctext b{font-size:19px;letter-spacing:.5px}
.classbtn .sub{display:block;font-size:12.5px;color:#9a8f72;margin-top:2px;font-family:Georgia,serif;letter-spacing:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"></div>
<div id="dev"></div>
<script>
// показать dev-оверлей по ?dev=1
if (new URLSearchParams(location.search).has('dev')) document.getElementById('dev').style.display='block';
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
